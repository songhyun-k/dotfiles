# ╔══════════════════════════════════════════╗
# ║           General Settings               ║
# ╚══════════════════════════════════════════╝

set -g prefix C-b
bind C-b send-prefix
set -g history-limit 100000
set -g allow-rename off
set -g automatic-rename off
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -as terminal-features ',xterm-256color:clipboard'

# ╔══════════════════════════════════════════╗
# ║           Copy Mode (vi)                 ║
# ╚══════════════════════════════════════════╝

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
set -s set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# ╔══════════════════════════════════════════╗
# ║           Keybindings                    ║
# ╚══════════════════════════════════════════╝

# Split with current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Pane navigation (Alt+hjkl, no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane navigation (Alt+Arrow, no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window navigation
bind -n S-Left  previous-window
bind -n S-Right next-window

# Window reorder
bind -n C-S-Left swap-window -t -1
bind -n C-S-Right swap-window -t +1

# Toggle pane title visibility
bind T run 'zsh -c "arr=( off top ) && tmux setw pane-border-status \${arr[\$(( \${arr[(I)#{pane-border-status}]} % 2 + 1 ))]}"'

# Rename pane
bind t command-prompt -p "(rename-pane)" -I "#T" "select-pane -T '%%'"

# Open yazi file explorer (50% horizontal split)
bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"

# ╔══════════════════════════════════════════╗
# ║           Plugins                        ║
# ╚══════════════════════════════════════════╝

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'

# Plugin: sessionist
set -g @sessionist-join-pane 'M-t'

# Plugin: online-status
set -g @online_icon "ok"
set -g @offline_icon "nok"

# ╔══════════════════════════════════════════╗
# ║           Appearance                     ║
# ╚══════════════════════════════════════════╝

source-file ~/.config/tmux/colors.conf

# --- Status bar ---
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# Status left
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=default,bold]   #S },#{#[bg=default,fg=#{@thm_red},bold]   #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]│"
set -ga status-left "#[bg=default,fg=#{@thm_green},bold]   #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue},bold]   #{=/-30/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow},bold]#{?window_zoomed_flag,   zoom ,}"

# Status right (dynamic script handles online/battery/IME availability)
set -g status-right-length 150
set -g status-right '#(~/.config/tmux/status-right.sh)'

# --- Responsive layout (1-line wide / 2-line narrow) ---
set-hook -g client-resized 'run-shell "~/.config/tmux/responsive-status.sh"'
set-hook -g client-attached 'run-shell "~/.config/tmux/responsive-status.sh"'

# --- Pane borders ---
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-style "bg=default,fg=#{@thm_overlay0}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_red}"
setw -g pane-border-lines single

# --- Window icons (command → icon mapping) ---
# Both formats are identical; only style (color/bold) differentiates active window
set -g window-status-format '\
#{?#{==:#{pane_current_command},zsh},  ,\
#{?#{==:#{pane_current_command},fish}, 󰈺 ,\
#{?#{==:#{pane_current_command},nvim},  ,\
#{?#{==:#{pane_current_command},git}, 󰊢 ,\
#{?#{==:#{pane_current_command},htop},  ,\
#{?#{==:#{pane_current_command},yazi}, 󰀶 ,\
#{?#{==:#{pane_current_command},python}, 󰌠 ,\
#{?#{==:#{pane_current_command},bash},  ,\
#{?#{==:#{pane_current_command},ssh},  ,\
#{?#{==:#{pane_current_command},node},  ,\
#{?#{==:#{pane_current_command},cargo},  ,\
#{?#{==:#{pane_current_command},rustc},  ,\
#{?#{==:#{pane_current_command},lua},  ,\
#{?#{m/r:^[0-9]+\.[0-9]+\.[0-9]+$,#{pane_current_command}}, 󰚩 ,\
 󰘧 }}}}}}}}}}}}}}'
set -g window-status-current-format '\
#{?#{==:#{pane_current_command},zsh},  ,\
#{?#{==:#{pane_current_command},fish}, 󰈺 ,\
#{?#{==:#{pane_current_command},nvim},  ,\
#{?#{==:#{pane_current_command},git}, 󰊢 ,\
#{?#{==:#{pane_current_command},htop},  ,\
#{?#{==:#{pane_current_command},yazi}, 󰀶 ,\
#{?#{==:#{pane_current_command},python}, 󰌠 ,\
#{?#{==:#{pane_current_command},bash},  ,\
#{?#{==:#{pane_current_command},ssh},  ,\
#{?#{==:#{pane_current_command},node},  ,\
#{?#{==:#{pane_current_command},cargo},  ,\
#{?#{==:#{pane_current_command},rustc},  ,\
#{?#{==:#{pane_current_command},lua},  ,\
#{?#{m/r:^[0-9]+\.[0-9]+\.[0-9]+$,#{pane_current_command}}, 󰚩 ,\
 󰘧 }}}}}}}}}}}}}}'

# Window styles (color differentiation for active/inactive)
set -g window-status-style "bg=default,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=default,fg=#{@thm_flamingo}"
set -g window-status-current-style "bg=default,fg=#{@thm_peach},bold"
set -g window-status-activity-style "bg=default,fg=#{@thm_pink},bold"
set -g window-status-bell-style "bg=default,fg=#{@thm_red},bold"

# ╔══════════════════════════════════════════╗
# ║           TPM Bootstrap                  ║
# ╚══════════════════════════════════════════╝

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'

run '~/.config/tmux/responsive-status.sh'
